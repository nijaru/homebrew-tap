name: Update Formula

on:
  repository_dispatch:
    types: [release-published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.0.14)'
        required: true
        type: string

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download checksums
        id: shas
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE="https://github.com/nijaru/jb/releases/download/v${VERSION}"

          download_sha() {
            local url=$1
            local attempts=10
            for i in $(seq 1 $attempts); do
              result=$(curl -sfL "$url" | awk '{print $1}')
              if [ -n "$result" ]; then echo "$result"; return 0; fi
              echo "Waiting for $url (attempt $i/$attempts)..." >&2
              sleep 30
            done
            echo "ERROR: failed to fetch $url" >&2; return 1
          }

          MAC_ARM64=$(download_sha "${BASE}/jb-aarch64-apple-darwin.tar.gz.sha256")
          LINUX_ARM64=$(download_sha "${BASE}/jb-aarch64-unknown-linux-gnu.tar.gz.sha256")
          LINUX_X64=$(download_sha "${BASE}/jb-x86_64-unknown-linux-gnu.tar.gz.sha256")
          SOURCE=$(curl -sfL "https://github.com/nijaru/jb/archive/refs/tags/v${VERSION}.tar.gz" | sha256sum | awk '{print $1}')

          echo "mac_arm64=${MAC_ARM64}" >> $GITHUB_OUTPUT
          echo "linux_arm64=${LINUX_ARM64}" >> $GITHUB_OUTPUT
          echo "linux_x64=${LINUX_X64}" >> $GITHUB_OUTPUT
          echo "source=${SOURCE}" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAC_ARM64="${{ steps.shas.outputs.mac_arm64 }}"
          LINUX_ARM64="${{ steps.shas.outputs.linux_arm64 }}"
          LINUX_X64="${{ steps.shas.outputs.linux_x64 }}"
          SOURCE="${{ steps.shas.outputs.source }}"

          awk -v ver="$VERSION" \
              -v mac_arm64="$MAC_ARM64" \
              -v linux_arm64="$LINUX_ARM64" \
              -v linux_x64="$LINUX_X64" \
              -v source_sha="$SOURCE" '
            /version "/ { sub(/"[0-9.]+"/, "\"" ver "\""); print; next }
            /url.*jb-aarch64-apple-darwin/   { last="mac_arm64";  sub(/v[0-9.]+/, "v" ver); print; next }
            /url.*jb-aarch64-unknown-linux/  { last="linux_arm64"; sub(/v[0-9.]+/, "v" ver); print; next }
            /url.*jb-x86_64-unknown-linux/   { last="linux_x64";  sub(/v[0-9.]+/, "v" ver); print; next }
            /url.*archive\/refs\/tags/       { last="source";     sub(/v[0-9.]+\.tar\.gz/, "v" ver ".tar.gz"); print; next }
            /sha256/ {
              if      (last == "mac_arm64")   { print "      sha256 \"" mac_arm64 "\"";   last=""; next }
              else if (last == "linux_arm64") { print "      sha256 \"" linux_arm64 "\""; last=""; next }
              else if (last == "linux_x64")  { print "      sha256 \"" linux_x64 "\"";   last=""; next }
              else if (last == "source")     { print "      sha256 \"" source_sha "\"";  last=""; next }
            }
            { print }
          ' Formula/jb.rb > Formula/jb.rb.tmp && mv Formula/jb.rb.tmp Formula/jb.rb

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/jb.rb
          if git diff --staged --quiet; then
            echo "Formula already at v${VERSION}"
          else
            git commit -m "chore: update jb to v${VERSION}"
            git push
          fi
